<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemowaves AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#020617;
--panel:#111827;
--accent:#22c55e;
--text:#ffffff;
}

body{
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

#particles{position:fixed;inset:0;z-index:0}

.landing{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
padding:20px;
animation:fadeIn 1s ease;
}

.logo{
font-size:clamp(48px,8vw,90px);
font-weight:800;
color:var(--accent);
animation:logoFloat 4s ease-in-out infinite;
}

.tagline{margin-top:12px;font-size:20px;opacity:.85}

.startBtn{
margin-top:30px;
background:var(--accent);
border:none;
padding:15px 40px;
color:white;
border-radius:16px;
font-size:20px;
cursor:pointer;
transition:transform .2s,box-shadow .2s;
}

.startBtn:hover{transform:scale(1.05);box-shadow:0 0 20px #22c55e}

@keyframes logoFloat{
0%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
50%{transform:translateY(-12px);text-shadow:0 0 22px #22c55e}
100%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
}

@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes screenOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.9)}}

.app{display:none;position:absolute;inset:0;z-index:1;animation:fadeIn .6s ease}
.layout{display:flex;height:100%}

.sidebar{width:230px;background:#020617;border-right:1px solid #1f2937;padding:14px;display:none;flex-direction:column}
.sidebar.open{display:flex}

.newChat,.shuffleBtn{border:none;padding:10px;color:white;border-radius:10px;margin-bottom:8px;cursor:pointer}
.newChat{background:var(--accent)}
.shuffleBtn{background:#6366f1}

.chatHistory{flex:1;overflow:auto;margin-top:8px}

.chatItem{display:flex;justify-content:space-between;align-items:center;padding:10px;background:#111827;border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:14px}
.chatItem.active{outline:2px solid #22c55e}
.chatItem button{background:none;border:none;color:#ef4444;cursor:pointer}

.chatArea{flex:1;display:flex;flex-direction:column}

header{display:flex;justify-content:space-between;align-items:center;padding:12px;border-bottom:1px solid #1f2937}
.controls{display:flex;gap:6px}
button{border:none;border-radius:8px;padding:7px 10px;cursor:pointer;font-size:14px}

.send{background:var(--accent);color:white}
.clear{background:#ef4444;color:white}
.voice{background:#0ea5e9;color:white}
.theme{background:#6366f1;color:white}

#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}

.msg{max-width:90%;padding:12px 14px;border-radius:14px;line-height:1.6;font-size:18px;word-wrap:break-word;overflow-wrap:anywhere}
.user{background:#0ea5e9;align-self:flex-end}
.bot{background:#111827}

#inputArea{display:flex;gap:8px;padding:10px;border-top:1px solid #1f2937}

textarea{flex:1;resize:none;padding:10px;border-radius:9px;border:none;background:black;color:white;font-size:18px}

.codeBlock{background:#0b1020;padding:12px;border-radius:10px;position:relative;max-width:100%;overflow:hidden}
.codeBlock pre{overflow:auto;max-height:300px;white-space:pre}

.dot{display:inline-block;width:10px;height:10px;margin:0 3px;border-radius:50%;background:#22c55e;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes pulse{0%{transform:scale(.6);opacity:.4}50%{transform:scale(1.6);opacity:1}100%{transform:scale(.6);opacity:.4}}

.copyBtn,.runBtn,.downloadBtn{position:absolute;top:6px;font-size:11px;padding:4px 7px;border-radius:6px;color:white}
.copyBtn{right:6px;background:#22c55e}
.runBtn{right:60px;background:#0ea5e9}
.downloadBtn{right:120px;background:#6366f1}

#previewModal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}

#previewBox{width:90%;height:85%;background:white;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}
#previewBox iframe{flex:1;border:none}
#closePreview{background:#ef4444;color:white;padding:8px;border:none}

@media (max-width:700px){.msg{font-size:15px}textarea{font-size:15px}}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
<div class="logo">Lemowaves AI</div>
<div class="tagline">Your powerful Gen‑Z AI assistant</div>
<button class="startBtn" id="startBtn">Get Started</button>
</div>

<div class="app" id="app">
<div class="layout">

<div class="sidebar" id="sidebar">
<button class="newChat" id="newChatBtn">+ New Chat</button>
<button class="shuffleBtn" id="shuffleBtn">Shuffle</button>
<div id="history" class="chatHistory"></div>
</div>

<div class="chatArea">
<header>
<div style="display:flex;align-items:center;gap:10px">
<button id="menuBtn">☰</button>
<div style="font-weight:800;color:#22c55e;font-size:20px">Lemowaves AI</div>
</div>

<div class="controls">
<button id="themeBtn" class="theme">Theme</button>
<button id="voiceBtn" class="voice">Voice Off</button>
<button id="clearBtn" class="clear">Clear</button>
</div>
</header>

<div id="chat"></div>

<div id="inputArea">
<input type="file" id="imageInput" accept="image/*" style="display:none">
<button id="imageBtn" style="background:#f59e0b;color:white">📷</button>
<textarea id="userInput" placeholder="Ask anything..."></textarea>
<button id="sendBtn" class="send">Send</button>
</div>

</div>
</div>
</div>

<div id="previewModal">
<div id="previewBox">
<button id="closePreview">Close</button>
<iframe id="gameFrame"></iframe>
</div>
</div>

<script>

/* PARTICLES */
const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")
let particles=[]

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize()
window.addEventListener("resize",resize)

for(let i=0;i<70;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*0.4,vy:(Math.random()-.5)*0.4})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="#22c55e"
particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1
ctx.beginPath()
ctx.arc(p.x,p.y,1.6,0,Math.PI*2)
ctx.fill()
})
requestAnimationFrame(animate)
}
animate()

/* ELEMENTS */
const landing=document.getElementById("landing")
const app=document.getElementById("app")
const chat=document.getElementById("chat")
const input=document.getElementById("userInput")
const sidebar=document.getElementById("sidebar")
const historyDiv=document.getElementById("history")

/* CHAT SYSTEM */
let chats={}
let activeChat=null
let chatCount=0

function switchChat(id,element){
if(activeChat!==null){chats[activeChat]=chat.innerHTML}
activeChat=id
chat.innerHTML=chats[id]||""
Array.from(historyDiv.children).forEach(c=>c.classList.remove("active"))
if(element)element.classList.add("active")
}

function createChat(name){
const id="chat_"+Date.now()+Math.floor(Math.random()*9999)
chats[id]=""

const item=document.createElement("div")
item.className="chatItem"

const label=document.createElement("span")
label.textContent=name

const del=document.createElement("button")
del.textContent="✕"

item.appendChild(label)
item.appendChild(del)

item.onclick=(e)=>{
if(e.target===del)return
switchChat(id,item)
}

 del.onclick=(e)=>{
 e.stopPropagation()
 delete chats[id]
 item.remove()
 if(activeChat===id){chat.innerHTML="";activeChat=null}
 }

historyDiv.appendChild(item)
switchChat(id,item)
}

createChat("Chat 1")
chatCount=1

/* BUTTON FIXES */
const newChatBtn=document.getElementById("newChatBtn")
const shuffleBtn=document.getElementById("shuffleBtn")
const sendBtn=document.getElementById("sendBtn")
const clearBtn=document.getElementById("clearBtn")
const themeBtn=document.getElementById("themeBtn")
const voiceBtn=document.getElementById("voiceBtn")
const imageBtn=document.getElementById("imageBtn")
const imageInput=document.getElementById("imageInput")
const startBtn=document.getElementById("startBtn")
const menuBtn=document.getElementById("menuBtn")
const previewModal=document.getElementById("previewModal")
const closePreview=document.getElementById("closePreview")
const gameFrame=document.getElementById("gameFrame")

/* NEW CHAT */
newChatBtn.onclick=()=>{chatCount++;createChat("Chat "+chatCount)}

/* SHUFFLE */
shuffleBtn.onclick=()=>{
const prompts=["Create snake game in HTML","Make calculator in HTML","Create pong game HTML","Make todo app HTML"]
input.value=prompts[Math.floor(Math.random()*prompts.length)]
}

/* MESSAGES */
function renderMessage(text,type){
const div=document.createElement("div")
div.className="msg "+type
if(type==="bot"){streamText(div,text)}else{div.textContent=text}
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight
if(activeChat)chats[activeChat]=chat.innerHTML
}

function streamText(el,text){
const words=text.split(" ")
let i=0
const interval=setInterval(()=>{
if(i<words.length){el.textContent+=words[i]+" ";i++;chat.scrollTop=chat.scrollHeight}
else clearInterval(interval)
},25)
}

/* AI */
async function askAI(msg){
const thinking=document.createElement("div")
thinking.className="msg bot"
thinking.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>'
chat.appendChild(thinking)

try{
const system="You are Lemowaves AI created by Sam. Speak GenZ when user jokes but speak normal if user serious.";
const prompt=system+" User:"+msg
const url="https://text.pollinations.ai/"+encodeURIComponent(prompt)

const response=await fetch(url)
const text=await response.text()

thinking.remove()

if(!text||text.includes("error")){
renderMessage("AI server error. Try again.","bot")
return
}

renderMessage(text,"bot")
}
catch(e){thinking.remove();renderMessage("Server error. Retry.","bot")}
}

/* IMAGE */
let imageData=null
imageBtn.onclick=()=>imageInput.click()
imageInput.onchange=()=>{
const file=imageInput.files[0]
if(!file)return
const reader=new FileReader()
reader.onload=e=>{imageData=e.target.result;renderMessage("[Image uploaded]","user")}
reader.readAsDataURL(file)
}

/* SEND */
function send(){
let msg=input.value.trim()

if(imageData){
msg += " User uploaded image base64:"+imageData.substring(0,500)
imageData=null
}

if(!msg)return

renderMessage(msg,"user")
input.value=""
askAI(msg)
}

sendBtn.onclick=send

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();send()}
})

/* CLEAR */
clearBtn.onclick=()=>{chat.innerHTML="";if(activeChat)chats[activeChat]=""}

/* SIDEBAR */
menuBtn.onclick=()=>sidebar.classList.toggle("open")

/* THEME */
let dark=true

themeBtn.onclick=()=>{
dark=!dark
if(dark){
document.documentElement.style.setProperty("--bg","#020617")
document.documentElement.style.setProperty("--text","#ffffff")
}else{
document.documentElement.style.setProperty("--bg","#f1f5f9")
document.documentElement.style.setProperty("--text","#000000")
}
}

/* VOICE */
let voiceEnabled=false
voiceBtn.onclick=()=>{voiceEnabled=!voiceEnabled;voiceBtn.textContent=voiceEnabled?"Voice On":"Voice Off"}

function speak(text){
if(!voiceEnabled)return
const u=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(u)
}

/* PREVIEW */
closePreview.onclick=()=>previewModal.style.display="none"

/* START */
startBtn.onclick=()=>{
landing.style.animation="screenOut .6s forwards"
setTimeout(()=>{landing.style.display="none";app.style.display="block"},550)
}

</script>
</body>
</html>
