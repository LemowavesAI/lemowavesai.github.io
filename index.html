<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemowaves AI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#020617;
--panel:#111827;
--accent:#22c55e;
--text:#ffffff;
--user:#0ea5e9;
--glow:rgba(34,197,94,0.35);
}

body{
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

#particles{position:fixed;inset:0;z-index:0}

.landing{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
z-index:2;
padding:20px;
animation:fadeIn 1s ease;
}

.logo{
font-size:clamp(48px,8vw,90px);
font-weight:800;
color:var(--accent);
animation:logoFloat 4s ease-in-out infinite;
}

.tagline{margin-top:12px;font-size:20px;opacity:.85}

.startBtn{
margin-top:30px;
background:var(--accent);
border:none;
padding:15px 40px;
color:white;
border-radius:16px;
font-size:20px;
cursor:pointer;
transition:transform .2s,box-shadow .2s;
}

.startBtn:hover{transform:scale(1.05);box-shadow:0 0 20px #22c55e}

@keyframes logoFloat{
0%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
50%{transform:translateY(-12px);text-shadow:0 0 22px #22c55e}
100%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
}

@keyframes fadeIn{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
@keyframes screenOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.9)}}

.app{display:none;position:absolute;inset:0;z-index:1;animation:fadeIn .6s ease}
.layout{display:flex;height:100%}

/* Sidebar is now ~1/6 of screen width on large screens */
.sidebar{
width: clamp(220px, 16.67vw, 280px);
background:#020617;
border-right:1px solid #1f2937;
padding:16px;
display:none;
flex-direction:column;
overflow-y:auto;
transition: transform 0.28s ease;
transform: translateX(-100%);
position: fixed;
top: 0;
bottom: 0;
left: 0;
z-index: 100;
}

.sidebar.open{
display:flex;
transform: translateX(0);
}

.newChat,.shuffleBtn,.actionBtn{
border:none;
padding:14px 18px;
color:white;
border-radius:12px;
margin-bottom:12px;
cursor:pointer;
font-size:15px;
font-weight:600;
transition: all 0.18s;
box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.newChat{background:var(--accent)}
.shuffleBtn{background:#6366f1}
.actionBtn{background:#4f46e5}
.newChat:hover,.shuffleBtn:hover,.actionBtn:hover{
transform:translateY(-1px);
box-shadow:0 6px 20px var(--glow);
}

.chatHistory{flex:1;overflow:auto;margin-top:12px}

.chatItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 14px;
background:#111827;
border-radius:10px;
margin-bottom:8px;
cursor:pointer;
font-size:15px;
transition: all 0.15s;
}
.chatItem:hover{background:#1f2937}
.chatItem.active{outline:2px solid var(--accent);background:#1f2937}
.chatItem button{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer}

.chatArea{flex:1;display:flex;flex-direction:column}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 16px;
border-bottom:1px solid #1f2937;
flex-wrap:nowrap;
gap:12px;
min-height:60px;
}
.logo-header{font-weight:800;color:var(--accent);font-size:22px}
.controls{
display:flex;
gap:8px;
flex-wrap:nowrap;
overflow-x:auto;
padding:4px 0;
-ms-overflow-style:none;
scrollbar-width:none;
}
.controls::-webkit-scrollbar{display:none}

button{
border:none;
border-radius:10px;
padding:10px 18px;
cursor:pointer;
font-size:15px;
font-weight:500;
min-width:88px;
white-space:nowrap;
transition: all 0.18s;
}
button:hover{transform:translateY(-1px);box-shadow:0 4px 16px var(--glow)}

.send{background:var(--accent);color:white}
.clear{background:#ef4444;color:white}
.voice{background:#0ea5e9;color:white}
.theme{background:#6366f1;color:white}
.regenerate{background:#8b5cf6;color:white}
.copyLast{background:#10b981;color:white}
.summarize{background:#f59e0b;color:white}

#chat{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}

.msg{
max-width:90%;
padding:14px 16px;
border-radius:16px;
line-height:1.6;
font-size:18px;
word-wrap:break-word;
overflow-wrap:anywhere;
}
.user{background:var(--user);color:white;align-self:flex-end}
.bot{background:#111827}

.image-preview{
max-width:280px;
border-radius:12px;
margin-top:8px;
border:1px solid #333;
align-self:flex-end;
}

#inputArea{
display:flex;
gap:10px;
padding:12px 16px;
border-top:1px solid #1f2937;
align-items:center;
}
textarea{
flex:1;
resize:none;
padding:12px;
border-radius:10px;
border:none;
background:black;
color:white;
font-size:18px;
max-height:160px;
}
#status{
font-size:13px;
color:#888;
margin-left:12px;
white-space:nowrap;
}

.dot{display:inline-block;width:10px;height:10px;margin:0 3px;border-radius:50%;background:#22c55e;animation:pulse 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes pulse{0%{transform:scale(.6);opacity:.4}50%{transform:scale(1.6);opacity:1}100%{transform:scale(.6);opacity:.4}}

@media (max-width:700px){
.msg{font-size:16px}
textarea{font-size:16px}
.sidebar{width: clamp(240px, 75vw, 300px)}
header{padding:10px 12px}
button{font-size:14px;padding:9px 16px;min-width:78px}
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
<div class="logo">Lemowaves AI</div>
<div class="tagline">Your powerful Gen‑Z AI assistant</div>
<button class="startBtn" id="startBtn">Get Started</button>
</div>

<div class="app" id="app">
<div class="layout">

<div class="sidebar" id="sidebar">
<button class="newChat" id="newChatBtn">+ New Chat</button>
<button class="shuffleBtn" id="shuffleBtn">Shuffle Prompt</button>

<div style="margin:20px 0 10px;color:#aaa;font-size:14px;font-weight:600">Quick Actions</div>
<button class="actionBtn" id="summarizeBtn">📝 Summarize This Chat</button>
<button class="actionBtn" id="exportBtn">📤 Export Chat</button>
<button class="actionBtn" id="clearMemoryBtn">🧹 Clear All Memory</button>

<div id="history" class="chatHistory"></div>
</div>

<div class="chatArea">
<header>
<div style="display:flex;align-items:center;gap:12px;min-width:0">
<button id="menuBtn">☰</button>
<div class="logo-header">Lemowaves AI</div>
<span id="status"></span>
</div>

<div class="controls">
<button id="themeBtn" class="theme">Theme</button>
<button id="voiceBtn" class="voice">Voice Off</button>
<button id="clearBtn" class="clear">Clear Chat</button>
<button id="copyLastBtn" class="copyLast">📋 Copy Last</button>
<button id="regenerateBtn" class="regenerate">♻ Regenerate</button>
</div>
</header>

<div id="chat"></div>

<div id="inputArea">
<input type="file" id="imageInput" accept="image/*" style="display:none">
<button id="imageBtn" style="background:#f59e0b;color:white;padding:10px 14px;border-radius:10px">📷</button>
<textarea id="userInput" placeholder="Ask anything..."></textarea>
<button id="sendBtn" class="send">Send</button>
</div>

</div>
</div>
</div>

<script>
// ────────────────────────────────────────────────
// Particles (unchanged)
// ────────────────────────────────────────────────
const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")
let particles=[]

function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight}
resize()
window.addEventListener("resize",resize)

for(let i=0;i<70;i++){
particles.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*0.4,vy:(Math.random()-.5)*0.4})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="#22c55e"
particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1
ctx.beginPath()
ctx.arc(p.x,p.y,1.6,0,Math.PI*2)
ctx.fill()
})
requestAnimationFrame(animate)
}
animate()

// ────────────────────────────────────────────────
// Elements & Logic (same as before, only UI adjusted)
// ────────────────────────────────────────────────

const landing=document.getElementById("landing")
const app=document.getElementById("app")
const chat=document.getElementById("chat")
const input=document.getElementById("userInput")
const sidebar=document.getElementById("sidebar")
const historyDiv=document.getElementById("history")
const statusEl=document.getElementById("status")

let chats={}
let activeChat=null
let chatCount=0
let lastResponse=""

// ────────────────────────────────────────────────
// Memory & Chat logic (unchanged from previous good version)
// ────────────────────────────────────────────────

function saveChats(){
try{localStorage.setItem("lemowaves_chats",JSON.stringify(chats))}catch(e){}
}

function loadChats(){
try{
const saved=localStorage.getItem("lemowaves_chats")
if(saved){
chats=JSON.parse(saved)
Object.keys(chats).forEach(id=>{
const item=document.createElement("div")
item.className="chatItem"
item.innerHTML=`<span>${chats[id].title||"Chat "+id.slice(-6)}</span><button>✕</button>`
item.onclick=e=>{if(e.target.tagName==="BUTTON")return;switchChat(id,item)}
item.querySelector("button").onclick=e=>{
e.stopPropagation()
delete chats[id]
item.remove()
saveChats()
if(activeChat===id){chat.innerHTML="";activeChat=null;statusEl.textContent=""}
}
historyDiv.appendChild(item)
})
if(Object.keys(chats).length===0){
createChat("Chat 1")
}else{
const recent=Object.keys(chats).sort((a,b)=>chats[b].updated-chats[a].updated)[0]
const el=Array.from(historyDiv.children).find(c=>c.querySelector("span").textContent.includes(chats[recent].title||recent))
if(el)switchChat(recent,el)
}
}else{
createChat("Chat 1")
}
}catch(e){createChat("Chat 1")}
}

function createChat(name){
const id="chat_"+Date.now()+Math.floor(Math.random()*9999)
chats[id]={title:name,messages:[],updated:Date.now()}
chatCount++

const item=document.createElement("div")
item.className="chatItem"
item.innerHTML=`<span>${name}</span><button>✕</button>`
item.onclick=e=>{if(e.target.tagName==="BUTTON")return;switchChat(id,item)}
item.querySelector("button").onclick=e=>{
e.stopPropagation()
delete chats[id]
item.remove()
saveChats()
if(activeChat===id){chat.innerHTML="";activeChat=null;statusEl.textContent=""}
}
historyDiv.appendChild(item)
switchChat(id,item)
}

function switchChat(id,element){
if(activeChat){
chats[activeChat].messages=Array.from(chat.querySelectorAll('.msg')).map(m=>({
role:m.classList.contains("user")?"user":"assistant",
content:m.textContent
}))
chats[activeChat].updated=Date.now()
}

activeChat=id
chat.innerHTML=""

chats[id].messages.forEach(m=>{
const div=document.createElement("div")
div.className="msg "+(m.role==="user"?"user":"bot")
div.textContent=m.content
chat.appendChild(div)
})

Array.from(historyDiv.children).forEach(c=>c.classList.remove("active"))
if(element)element.classList.add("active")

statusEl.textContent=`Memory: ${chats[id]?.messages?.length||0} msgs`
chat.scrollTop=chat.scrollHeight
saveChats()
}

// ────────────────────────────────────────────────
// Messages & Streaming (unchanged)
// ────────────────────────────────────────────────

function renderMessage(text,type,isImage=false){
const div=document.createElement("div")
div.className="msg "+type

if(isImage){
const img=document.createElement("img")
img.src=text
img.className="image-preview"
img.alt="Uploaded image"
div.appendChild(img)
}else{
div.textContent=text
}

chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

if(activeChat){
if(!chats[activeChat])chats[activeChat]={messages:[]}
chats[activeChat].messages.push({
role:type==="user"?"user":"assistant",
content:text
})
chats[activeChat].updated=Date.now()
statusEl.textContent=`Memory: ${chats[activeChat].messages.length} msgs`
saveChats()
}

if(type==="bot")lastResponse=text
}

function streamText(el,text){
const words=text.split(" ")
let i=0
const interval=setInterval(()=>{
if(i<words.length){
el.textContent+=words[i]+" "
i++
chat.scrollTop=chat.scrollHeight
}else clearInterval(interval)
},28)
}

// ────────────────────────────────────────────────
// AI call (unchanged)
// ────────────────────────────────────────────────

async function askAI(userMsg){
const thinking=document.createElement("div")
thinking.className="msg bot"
thinking.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>'
chat.appendChild(thinking)
chat.scrollTop=chat.scrollHeight

try{
const history=activeChat&&chats[activeChat]?chats[activeChat].messages.slice(-14):[]

const system=`You are Lemowaves AI — intelligent, direct, culturally aware assistant from India.
Use Gen-Z slang / casual tone when user uses "bro", slang, jokes or emojis.
Otherwise speak clear, professional and helpful.
Always answer the actual question — never just repeat it.
Understand follow-ups and full conversation history.
Use markdown for code, lists, emphasis when useful.
Current context: March 2026, user likely in Mumbai.`

const messages=[
{role:"system",content:system},
...history,
{role:"user",content:userMsg}
]

const res=await fetch("https://text.pollinations.ai/openai",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
model:"gpt-4o-mini",
messages,
temperature:0.75,
max_tokens:2048
})
})

if(!res.ok)throw new Error("API error")

const data=await res.json()
const reply=data.choices?.[0]?.message?.content?.trim()||"No reply received."

thinking.remove()
const botDiv=document.createElement("div")
botDiv.className="msg bot"
chat.appendChild(botDiv)
streamText(botDiv,reply)

if(activeChat){
chats[activeChat].messages.push({role:"assistant",content:reply})
chats[activeChat].updated=Date.now()
saveChats()
lastResponse=reply
}

}catch(e){
thinking.remove()
renderMessage("Server error. Try again in a moment.","bot")
}
}

// ────────────────────────────────────────────────
// Image + Send logic (unchanged)
// ────────────────────────────────────────────────

let imageData=null
document.getElementById("imageBtn").onclick=()=>document.getElementById("imageInput").click()

document.getElementById("imageInput").onchange=e=>{
const file=e.target.files[0]
if(!file)return

const reader=new FileReader()
reader.onload=ev=>{
imageData=ev.target.result
renderMessage(imageData,"user",true)
}
reader.readAsDataURL(file)
}

function send(){
let msg=input.value.trim()
if(!msg&&!imageData)return

if(imageData){
msg=msg||"Check this image"
}

renderMessage(msg||"[Image]","user")
input.value=""

if(imageData){
msg+="\n[Image uploaded – describe, analyze or edit ideas]"
imageData=null
}

askAI(msg)
}

document.getElementById("sendBtn").onclick=send
input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault()
send()
}
})

// ────────────────────────────────────────────────
// Extra buttons (unchanged)
// ────────────────────────────────────────────────

document.getElementById("copyLastBtn").onclick=()=>{
if(lastResponse){
navigator.clipboard.writeText(lastResponse).then(()=>alert("Last answer copied!"))
}
}

document.getElementById("regenerateBtn").onclick=()=>{
if(!activeChat||chats[activeChat].messages.length===0)return
const lastUser=[...chats[activeChat].messages].reverse().find(m=>m.role==="user")
if(lastUser){
chat.innerHTML=chat.innerHTML.split('<div class="msg bot">').slice(0,-1).join('<div class="msg bot">')
askAI(lastUser.content)
}
}

document.getElementById("summarizeBtn").onclick=()=>{
if(!activeChat||chats[activeChat].messages.length<4){
alert("Need more messages to summarize")
return
}
askAI("Give a concise summary of our entire conversation so far (4–8 sentences max).")
}

document.getElementById("exportBtn").onclick=()=>{
if(!activeChat)return
const text=chats[activeChat].messages.map(m=>`${m.role.toUpperCase()}: ${m.content}`).join("\n\n")
const blob=new Blob([text],{type:"text/plain"})
const url=URL.createObjectURL(blob)
const a=document.createElement("a")
a.href=url
a.download="lemowaves-chat.txt"
a.click()
URL.revokeObjectURL(url)
}

document.getElementById("clearMemoryBtn").onclick=()=>{
if(confirm("Erase ALL saved chats and memory forever?")){
localStorage.removeItem("lemowaves_chats")
location.reload()
}
}

// ────────────────────────────────────────────────
// Original controls
// ────────────────────────────────────────────────

document.getElementById("newChatBtn").onclick=()=>{
chatCount++
createChat("Chat "+chatCount)
}

document.getElementById("shuffleBtn").onclick=()=>{
const prompts=["Create snake game in HTML","Make calculator in HTML","Create pong game HTML","Make todo app HTML","Write Gen-Z roast","Explain quantum like I'm 12"]
input.value=prompts[Math.floor(Math.random()*prompts.length)]
}

document.getElementById("clearBtn").onclick=()=>{
chat.innerHTML=""
if(activeChat){
chats[activeChat].messages=[]
saveChats()
statusEl.textContent="Memory: 0 msgs"
}
}

document.getElementById("menuBtn").onclick=()=>sidebar.classList.toggle("open")

let dark=true
document.getElementById("themeBtn").onclick=()=>{
dark=!dark
document.documentElement.style.setProperty("--bg",dark?"#020617":"#f1f5f9")
document.documentElement.style.setProperty("--text",dark?"#ffffff":"#000000")
}

let voiceEnabled=false
document.getElementById("voiceBtn").onclick=()=>{
voiceEnabled=!voiceEnabled
document.getElementById("voiceBtn").textContent=voiceEnabled?"Voice On":"Voice Off"
}

function speak(text){
if(!voiceEnabled)return
const u=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(u)
}

document.getElementById("startBtn").onclick=()=>{
landing.style.animation="screenOut .6s forwards"
setTimeout(()=>{landing.style.display="none";app.style.display="block"},550)
}

// ────────────────────────────────────────────────
// Init
// ────────────────────────────────────────────────

loadChats()

</script>
</body>
</html>
