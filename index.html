<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemowaves AI • Gen-Z Code Master & Vibe AI • Built by Sam 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#020617;
      --text:#ffffff;
      --accent:#22c55e;
      --user-bg:#0ea5e9;
      --bot-bg:#111827;
      --sidebar-bg:#020617;
      --panel-bg:#111827;
      --border:#1f2937;
      --input-bg:#000000;
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif;overflow-x:hidden}
    #particles{position:fixed;inset:0;z-index:0;pointer-events:none}
    .landing{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:20px;animation:fadeIn 1s ease}
    .logo{font-size:clamp(50px,9vw,92px);font-weight:800;color:var(--accent);animation:logoFloat 4.5s ease-in-out infinite;letter-spacing:-1.5px}
    .tagline{margin-top:14px;font-size:19px;opacity:.88;line-height:1.42;max-width:540px}
    .startBtn{margin-top:32px;background:var(--accent);border:none;padding:15px 44px;color:white;border-radius:18px;font-size:20px;font-weight:600;cursor:pointer;transition:all .25s}
    .startBtn:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(34,197,94,.5)}
    @keyframes logoFloat{0%,100%{transform:translateY(0);text-shadow:0 0 0 #22c55e}50%{transform:translateY(-12px);text-shadow:0 0 30px #22c55e}}
    @keyframes fadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
    @keyframes screenOut{from{opacity:1;transform:scale(1)}to{opacity:0;transform:scale(.92)}}
    .app{display:none;position:absolute;inset:0;z-index:1;animation:fadeIn .7s ease}
    .layout{display:flex;height:100%}
    .sidebar{width:230px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:14px;display:none;flex-direction:column}
    .sidebar.open{display:flex}
    .newChat,.shuffleBtn{border:none;padding:12px;color:white;border-radius:12px;margin-bottom:10px;cursor:pointer;font-weight:600;font-size:15px}
    .newChat{background:var(--accent)}
    .shuffleBtn{background:#6366f1}
    .chatHistory{flex:1;overflow-y:auto;margin-top:10px}
    .chatItem{display:flex;justify-content:space-between;align-items:center;padding:11px;background:var(--panel-bg);border-radius:10px;margin-bottom:8px;cursor:pointer;font-size:14px;transition:all .2s}
    .chatItem:hover{background:#1f2937}
    .chatItem.active{outline:2px solid var(--accent);outline-offset:1px}
    .chatItem span{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chatItem button{background:none;border:none;color:#ef4444;font-size:18px;cursor:pointer;padding:0 4px}
    .chatArea{flex:1;display:flex;flex-direction:column;min-height:100%}
    header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0;z-index:10}
    .controls{display:flex;gap:8px}
    button{border:none;border-radius:10px;padding:8px 12px;cursor:pointer;font-size:14px;transition:transform .2s}
    button:hover{transform:scale(1.04)}
    .send{background:var(--accent);color:white;padding:9px 20px;font-size:15px}
    .clear{background:#ef4444;color:white}
    .voice{background:#0ea5e9;color:white}
    .theme{background:#6366f1;color:white;font-size:20px;padding:7px 12px}
    #chat{flex:1;overflow-y:auto;padding:16px 16px;display:flex;flex-direction:column;gap:12px;-webkit-overflow-scrolling:touch}
    .msg{max-width:88%;padding:12px 16px;border-radius:18px;line-height:1.5;font-size:16px;word-wrap:break-word;overflow-wrap:anywhere;position:relative}
    .user{background:var(--user-bg);color:#fff;align-self:flex-end}
    .bot{background:var(--bot-bg);color:var(--text)}
    #inputArea{display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
    textarea{flex:1;resize:none;padding:11px 14px;border-radius:12px;border:none;background:var(--input-bg);color:var(--text);font-size:16px;line-height:1.45;min-height:48px}
    #imageBtn{background:#f59e0b;color:white;font-size:22px;padding:10px 14px;border-radius:10px;border:none;cursor:pointer}
    .codeBlock{background:#0b1020;padding:12px;border-radius:10px;margin:10px 0;position:relative;overflow:hidden}
    .codeBlock pre{overflow-x:auto;max-height:340px;white-space:pre;font-size:14px;padding-bottom:36px}
    .code-actions{position:absolute;bottom:8px;right:8px;display:flex;gap:8px}
    .copyBtn,.runBtn{background:#22c55e;color:white;border:none;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer}
    .runBtn{background:#0ea5e9}
    .dot{display:inline-block;width:9px;height:9px;margin:0 4px;border-radius:50%;background:var(--accent);animation:pulse 1.3s infinite}
    .dot:nth-child(2){animation-delay:.2s}
    .dot:nth-child(3){animation-delay:.4s}
    @keyframes pulse{0%,100%{transform:scale(.6);opacity:.4}50%{transform:scale(1.4);opacity:1}}
    @media (max-width:800px){.sidebar{width:260px}.msg,textarea{font-size:15px}header,#chat,#inputArea{padding:10px 14px}}
    @media (max-height:700px){header{padding:10px 14px}#inputArea{padding:10px 14px}#chat{padding:12px 14px;gap:10px}.msg{padding:10px 14px;font-size:15px}}
  </style>
</head>
<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
  <div class="logo">Lemowaves AI</div>
  <div class="tagline">
    Gen-Z Code Master • Memory-Powered Vibe AI<br>
    Built by Sam • Running strong in 2026 🔥
  </div>
  <button class="startBtn" id="startBtn">START CODING & VIBING</button>
</div>

<div class="app" id="app">
  <div class="layout">

    <div class="sidebar" id="sidebar">
      <button class="newChat" id="newChatBtn">+ New Conversation</button>
      <button class="shuffleBtn" id="shuffleBtn">🔀 Random Prompt</button>
      <div id="history" class="chatHistory"></div>
    </div>

    <div class="chatArea">
      <header>
        <div style="display:flex;align-items:center;gap:12px">
          <button id="menuBtn" style="font-size:24px;background:none;color:var(--accent);border:none;cursor:pointer">☰</button>
          <div style="font-weight:800;color:#22c55e;font-size:22px">Lemowaves AI</div>
        </div>
        <div class="controls">
          <button id="themeBtn" class="theme">🌙</button>
          <button id="voiceBtn" class="voice">🎤 Off</button>
          <button id="clearBtn" class="clear">Clear Chat</button>
        </div>
      </header>

      <div id="chat"></div>

      <div id="inputArea">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button id="imageBtn">📷</button>
        <textarea id="userInput" placeholder="Ask anything... code, roast, advice, memes"></textarea>
        <button id="sendBtn" class="send">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
// ───────────────────────────────────────────────
//  PARTICLES BACKGROUND ANIMATION
// ───────────────────────────────────────────────
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

for (let i = 0; i < 90; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#22c55e";
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.7, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ───────────────────────────────────────────────
//  DOM ELEMENTS & GLOBAL STATE
// ───────────────────────────────────────────────
const landing    = document.getElementById("landing");
const app        = document.getElementById("app");
const chatDiv    = document.getElementById("chat");
const input      = document.getElementById("userInput");
const sidebar    = document.getElementById("sidebar");
const historyDiv = document.getElementById("history");

let chatList       = [];
let conversations  = {};
let activeChat     = null;
let isDark         = true;
let voiceEnabled   = false;

// ───────────────────────────────────────────────
//  SAFE LOCALSTORAGE + MEMORY FALLBACK
// ───────────────────────────────────────────────
let storageAvailable = false;
let memoryStorage    = {};

try {
  localStorage.setItem("__test__", "1");
  localStorage.removeItem("__test__");
  storageAvailable = true;
} catch (err) {
  console.warn("localStorage blocked → memory fallback active");
}

function saveState() {
  const payload = { chatList, conversations, activeChat };
  if (storageAvailable) {
    localStorage.setItem("lemowaves_data", JSON.stringify(payload));
  } else {
    memoryStorage = payload;
  }
}

function loadState() {
  let raw;
  if (storageAvailable) {
    raw = localStorage.getItem("lemowaves_data");
  } else {
    raw = JSON.stringify(memoryStorage);
  }

  if (!raw) {
    createNewChat("Chat 1");
    return;
  }

  try {
    const data = JSON.parse(raw);
    chatList = data.chatList || [];
    conversations = data.conversations || {};
    activeChat = data.activeChat || null;

    chatList.forEach(c => {
      historyDiv.appendChild(createChatItem(c.id, c.name));
    });

    if (activeChat && conversations[activeChat]) {
      const el = historyDiv.querySelector(`[data-id="${activeChat}"]`);
      if (el) switchChat(activeChat, el);
    } else if (chatList.length > 0) {
      switchChat(chatList[0].id, historyDiv.children[0]);
    }
  } catch (e) {
    createNewChat("Chat 1");
  }
}

// ───────────────────────────────────────────────
//  CHAT HISTORY ITEM FACTORY
// ───────────────────────────────────────────────
function createChatItem(id, name) {
  const item = document.createElement("div");
  item.className = "chatItem";
  item.dataset.id = id;
  item.innerHTML = `<span>${name}</span><button>×</button>`;

  item.addEventListener("click", e => {
    if (e.target.tagName === "BUTTON") return;
    switchChat(id, item);
  });

  item.querySelector("button").addEventListener("click", e => {
    e.stopPropagation();
    deleteChat(id);
  });

  return item;
}

// ───────────────────────────────────────────────
//  CREATE / DELETE / SWITCH CHAT
// ───────────────────────────────────────────────
function createNewChat(name = `Chat ${chatList.length + 1}`) {
  const id = "c_" + Date.now() + Math.random().toString(36).slice(2, 8);
  chatList.push({ id, name });
  conversations[id] = [];
  const item = createChatItem(id, name);
  historyDiv.appendChild(item);
  saveState();
  switchChat(id, item);
}

function deleteChat(id) {
  const idx = chatList.findIndex(c => c.id === id);
  if (idx < 0) return;
  chatList.splice(idx, 1);
  delete conversations[id];
  const el = historyDiv.querySelector(`[data-id="${id}"]`);
  if (el) el.remove();
  saveState();

  if (activeChat === id) {
    if (chatList.length > 0) {
      switchChat(chatList[0].id, historyDiv.children[0]);
    } else {
      activeChat = null;
      chatDiv.innerHTML = "";
    }
  }
}

function switchChat(id, element) {
  Array.from(historyDiv.children).forEach(el => el.classList.remove("active"));
  if (element) element.classList.add("active");

  activeChat = id;
  chatDiv.innerHTML = "";

  if (conversations[id]) {
    conversations[id].forEach(msg => {
      const div = document.createElement("div");
      div.className = `msg ${msg.role === "user" ? "user" : "bot"}`;
      div.innerHTML = msg.content;
      chatDiv.appendChild(div);
    });
  }
  chatDiv.scrollTop = chatDiv.scrollHeight;
  saveState();
}

// ───────────────────────────────────────────────
//  MESSAGE RENDERING + COPY / RUN BUTTONS
// ───────────────────────────────────────────────
function addMessage(role, content) {
  const msg = document.createElement("div");
  msg.className = `msg ${role === "user" ? "user" : "bot"}`;
  msg.innerHTML = content;

  if (role === "bot" && /```[\s\S]*?```/.test(content)) {
    const actions = document.createElement("div");
    actions.className = "code-actions";

    const copy = document.createElement("button");
    copy.className = "copyBtn";
    copy.textContent = "Copy";
    copy.onclick = () => {
      const clean = content.replace(/<[^>]+>/g, "");
      navigator.clipboard.writeText(clean);
      copy.textContent = "Copied!";
      setTimeout(() => copy.textContent = "Copy", 1800);
    };

    const run = document.createElement("button");
    run.className = "runBtn";
    run.textContent = "Run";
    run.onclick = () => {
      const win = window.open();
      win.document.write(`<!DOCTYPE html><html><head><title>Lemowaves Preview</title></head><body>${content}</body></html>`);
      win.document.close();
    };

    actions.append(copy, run);
    msg.appendChild(actions);
  }

  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  if (activeChat) {
    conversations[activeChat].push({ role, content });
    saveState();
  }
}

function streamText(element, fullText, onComplete) {
  const words = fullText.split(/\s+/);
  let i = 0;
  const interval = setInterval(() => {
    if (i < words.length) {
      element.innerHTML += (i > 0 ? " " : "") + words[i++];
      chatDiv.scrollTop = chatDiv.scrollHeight;
    } else {
      clearInterval(interval);
      onComplete?.();
    }
  }, 28);
}

// ───────────────────────────────────────────────
//  AI CALL – INTELLIGENT + STRONG MEMORY
// ───────────────────────────────────────────────
async function askAI() {
  if (!activeChat) return;

  const thinking = document.createElement("div");
  thinking.className = "msg bot";
  thinking.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chatDiv.appendChild(thinking);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  try {
    const system = `You are Lemowaves AI — a highly intelligent, adaptive, Gen-Z flavored assistant created by Sam in Bengaluru. Current date: March 17, 2026.

You behave like a mix between Grok and the best versions of ChatGPT:
- extremely good memory: you NEVER forget anything said earlier in this conversation
- deep reasoning when needed (step-by-step thinking for complex questions)
- code master: always write clean, complete, modern, working code when asked
- Gen-Z tone + emojis when user is casual/funny/young vibe
- clean, precise, professional tone when user is serious/technical/asking for advice
- witty, helpful, sometimes savage — but always maximally useful

You have perfect recall of the entire chat history. Reference earlier messages naturally when relevant. Stay in character.`;

    const historyText = conversations[activeChat]
      .map(m => `${m.role === "user" ? "User" : "Lemowaves AI"}: ${m.content}`)
      .join("\n\n");

    const prompt = system + "\n\n=== CONVERSATION HISTORY (most recent at bottom) ===\n" + historyText + "\n\nLemowaves AI:";

    const res = await fetch("https://text.pollinations.ai/" + encodeURIComponent(prompt));
    let reply = await res.text();

    if (!reply.trim()) reply = "AI took a quick nap 💤 Try again fam";

    thinking.remove();

    const msgEl = document.createElement("div");
    msgEl.className = "msg bot";
    chatDiv.appendChild(msgEl);

    streamText(msgEl, reply, () => {
      if (activeChat) {
        conversations[activeChat].push({ role: "assistant", content: reply });
        saveState();
      }
      if (voiceEnabled) speak(reply);
    });

  } catch (err) {
    thinking.remove();
    addMessage("bot", "Server is acting sus rn... retry king");
  }
}

// ───────────────────────────────────────────────
//  IMAGE UPLOAD PLACEHOLDER
// ───────────────────────────────────────────────
document.getElementById("imageBtn").onclick = () => document.getElementById("imageInput").click();
document.getElementById("imageInput").onchange = e => {
  const file = e.target.files[0];
  if (file && activeChat) {
    addMessage("user", `📸 Image uploaded: ${file.name} (vision support coming soon)`);
  }
  e.target.value = "";
};

// ───────────────────────────────────────────────
//  SEND LOGIC
// ───────────────────────────────────────────────
function handleSend() {
  const text = input.value.trim();
  if (!text) return;

  if (!activeChat) createNewChat();

  addMessage("user", text);
  input.value = "";
  askAI();
}

document.getElementById("sendBtn").onclick = handleSend;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ───────────────────────────────────────────────
//  CONTROLS & UTILITY BUTTONS
// ───────────────────────────────────────────────
document.getElementById("newChatBtn").onclick = () => createNewChat();

document.getElementById("shuffleBtn").onclick = () => {
  const ideas = [
    "Build a full snake game in vanilla HTML5 + JS + Canvas",
    "Create responsive dashboard UI with Tailwind + dark mode",
    "Make a modern todo app with localStorage persistence",
    "Code a Pomodoro timer with motivational Gen-Z quotes",
    "Generate a clean Spotify-inspired login page"
  ];
  input.value = ideas[Math.floor(Math.random() * ideas.length)];
};

document.getElementById("clearBtn").onclick = () => {
  if (activeChat) {
    conversations[activeChat] = [];
    chatDiv.innerHTML = "";
    saveState();
  }
};

document.getElementById("themeBtn").onclick = () => {
  isDark = !isDark;
  document.getElementById("themeBtn").textContent = isDark ? "🌙" : "☀️";

  const r = document.documentElement.style;
  if (isDark) {
    r.setProperty("--bg", "#020617");
    r.setProperty("--text", "#ffffff");
    r.setProperty("--user-bg", "#0ea5e9");
    r.setProperty("--bot-bg", "#111827");
    r.setProperty("--sidebar-bg", "#020617");
    r.setProperty("--panel-bg", "#111827");
    r.setProperty("--border", "#1f2937");
    r.setProperty("--input-bg", "#000000");
  } else {
    r.setProperty("--bg", "#f8fafc");
    r.setProperty("--text", "#0f172a");
    r.setProperty("--user-bg", "#2563eb");
    r.setProperty("--bot-bg", "#e2e8f0");
    r.setProperty("--sidebar-bg", "#f1f5f9");
    r.setProperty("--panel-bg", "#f8fafc");
    r.setProperty("--border", "#cbd5e1");
    r.setProperty("--input-bg", "#ffffff");
  }
};

document.getElementById("voiceBtn").onclick = () => {
  voiceEnabled = !voiceEnabled;
  document.getElementById("voiceBtn").textContent = voiceEnabled ? "🎤 On" : "🎤 Off";
};

function speak(text) {
  if (!voiceEnabled) return;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1.08;
  speechSynthesis.speak(utterance);
}

document.getElementById("menuBtn").onclick = () => sidebar.classList.toggle("open");

document.getElementById("startBtn").onclick = () => {
  landing.style.animation = "screenOut 0.7s forwards";
  setTimeout(() => {
    landing.style.display = "none";
    app.style.display = "block";
  }, 700);
};

// ───────────────────────────────────────────────
//  APPLICATION START
// ───────────────────────────────────────────────
loadState();

</script>
</body>
</html>
