<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemowaves AI V4</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#020617;
--panel:#111827;
--accent:#22c55e;
--text:#ffffff;
}

body{
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
}

#particles{position:fixed;inset:0;z-index:0}

/* LANDING */
.landing{
position:absolute;
inset:0;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
z-index:2;
animation:fadeIn .8s ease;
}

.logo{
font-size:clamp(40px,7vw,80px);
font-weight:800;
color:var(--accent);
animation:logoFloat 4s ease-in-out infinite;
}

@keyframes logoFloat{
0%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
50%{transform:translateY(-10px);text-shadow:0 0 14px #22c55e}
100%{transform:translateY(0);text-shadow:0 0 0 #22c55e}
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.96)}
to{opacity:1;transform:scale(1)}
}

@keyframes screenOut{
from{opacity:1;transform:scale(1)}
to{opacity:0;transform:scale(.94)}
}

.tagline{margin-top:14px;opacity:.9;max-width:500px}

.startBtn{
margin-top:30px;
background:var(--accent);
border:none;
padding:14px 30px;
color:white;
border-radius:14px;
font-size:18px;
cursor:pointer;
}

/* APP */
.app{
display:none;
position:absolute;
inset:0;
z-index:1;
}

.layout{display:flex;height:100%}

/* SIDEBAR */
.sidebar{
width:240px;
background:#020617;
border-right:1px solid #1f2937;
padding:15px;
display:none;
flex-direction:column;
}

.sidebar.open{display:flex}

.newChat{
background:var(--accent);
border:none;
padding:10px;
color:white;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.shuffleBtn{
background:#6366f1;
border:none;
padding:10px;
color:white;
border-radius:10px;
margin-bottom:10px;
cursor:pointer;
}

.chatHistory{flex:1;overflow:auto}

.chatItem{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#111827;
border-radius:8px;
margin-bottom:8px;
cursor:pointer;
font-size:14px;
}

.chatItem span{flex:1}

.chatItem button{
background:none;
border:none;
color:#ef4444;
font-size:14px;
cursor:pointer;
}

.chatItem.active{outline:1px solid var(--accent)}

/* CHAT AREA */
.chatArea{flex:1;display:flex;flex-direction:column}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px;
border-bottom:1px solid #1f2937;
}

.headerLeft{display:flex;align-items:center;gap:10px}

.controls{display:flex;align-items:center;gap:6px}

h1{font-size:22px;color:var(--accent)}

button{border:none;border-radius:8px;padding:8px 12px;cursor:pointer}

.send{background:var(--accent);color:white}
.clear{background:#ef4444;color:white}
.voice{background:#0ea5e9;color:white}
.theme{background:#6366f1;color:white}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
display:flex;
flex-direction:column;
gap:14px;
}

.msg{max-width:70%;padding:12px 14px;border-radius:14px;line-height:1.6}

.user{background:#0ea5e9;align-self:flex-end}
.bot{background:#111827}

#inputArea{display:flex;gap:10px;padding:12px;border-top:1px solid #1f2937}

textarea{
flex:1;
resize:none;
padding:10px;
border-radius:10px;
border:none;
background:black;
color:white;
}

/* THINKING DOTS */
.dot{
display:inline-block;
width:10px;height:10px;margin:0 3px;border-radius:50%;
background:#22c55e;animation:pulse 1.2s infinite
}

.dot:nth-child(2){animation-delay:.2s}
.dot:nth-child(3){animation-delay:.4s}

@keyframes pulse{
0%{transform:scale(.6);opacity:.4}
50%{transform:scale(1.5);opacity:1}
100%{transform:scale(.6);opacity:.4}
}

/* CODE BLOCK */
.codeBlock{background:#0b1020;padding:10px;border-radius:10px;position:relative}

.codeBlock pre{overflow:auto}

.copyBtn,.runBtn,.downloadBtn{
position:absolute;top:5px;font-size:11px;padding:4px 8px;border-radius:6px;color:white
}

.copyBtn{right:5px;background:#22c55e}
.runBtn{right:65px;background:#0ea5e9}
.downloadBtn{right:120px;background:#6366f1}

/* PREVIEW */
#previewModal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}

#previewBox{width:90%;height:85%;background:white;border-radius:10px;overflow:hidden;display:flex;flex-direction:column}

#previewBox iframe{flex:1;border:none}

#closePreview{background:#ef4444;color:white;padding:8px;border:none}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
<div class="logo">Lemowaves AI</div>
<div class="tagline">Gen‑Z AI chatbot created by Sam</div>
<button class="startBtn" id="startBtn">Get Started</button>
</div>

<div class="app" id="app">
<div class="layout">

<div class="sidebar" id="sidebar">
<button class="newChat" id="newChatBtn">+ New Chat</button>
<button class="shuffleBtn" id="shuffleBtn">Shuffle Prompt</button>
<div id="history" class="chatHistory"></div>
</div>

<div class="chatArea">
<header>
<div class="headerLeft">
<button id="menuBtn">☰</button>
<h1>Lemowaves AI</h1>
</div>
<div class="controls">
<button id="themeBtn" class="theme">Theme</button>
<button id="voiceBtn" class="voice">Voice Off</button>
<button id="clearBtn" class="clear">Clear</button>
</div>
</header>

<div id="chat"></div>

<div id="inputArea">
<textarea id="userInput" placeholder="Ask anything..."></textarea>
<button id="sendBtn" class="send">Send</button>
</div>

</div>
</div>
</div>

<div id="previewModal">
<div id="previewBox">
<button id="closePreview">Close Preview</button>
<iframe id="gameFrame"></iframe>
</div>
</div>

<script>

/* PARTICLES */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
let particles=[];

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

for(let i=0;i<70;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*0.4,
vy:(Math.random()-.5)*0.4
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="#22c55e";
particles.forEach(p=>{
p.x+=p.vx;
p.y+=p.vy;
if(p.x<0||p.x>canvas.width)p.vx*=-1;
if(p.y<0||p.y>canvas.height)p.vy*=-1;
ctx.beginPath();
ctx.arc(p.x,p.y,1.5,0,Math.PI*2);
ctx.fill();
});
requestAnimationFrame(animate);
}
animate();

/* UI */
const landing=document.getElementById("landing");
const app=document.getElementById("app");
const chat=document.getElementById("chat");
const input=document.getElementById("userInput");
const sidebar=document.getElementById("sidebar");
const historyDiv=document.getElementById("history");

let chats={};
let chatMemory={};
let activeChat=null;
let chatCount=0;

/* MENU */
document.getElementById("menuBtn").onclick=()=>sidebar.classList.toggle("open");

/* START */
document.getElementById("startBtn").onclick=()=>{
landing.style.animation="screenOut .5s forwards";
setTimeout(()=>{
landing.style.display="none";
app.style.display="block";
},450);
};

/* CREATE CHAT */
function createChat(name){
const id="chat_"+Date.now();
chats[id]="";
chatMemory[id]=[];

const item=document.createElement("div");
item.className="chatItem";

const label=document.createElement("span");
label.textContent=name;

const del=document.createElement("button");
del.textContent="✕";

item.appendChild(label);
item.appendChild(del);

item.onclick=()=>{
activeChat=id;
chat.innerHTML=chats[id];
Array.from(historyDiv.children).forEach(c=>c.classList.remove("active"));
item.classList.add("active");
};

/* REMOVE CHAT */
del.onclick=(e)=>{
e.stopPropagation();
delete chats[id];
delete chatMemory[id];
item.remove();
if(activeChat===id){chat.innerHTML="";activeChat=null}
};

historyDiv.appendChild(item);

if(!activeChat){
activeChat=id;
item.classList.add("active");
}
}

createChat("Chat 1");
chatCount=1;

/* NEW CHAT */
document.getElementById("newChatBtn").onclick=()=>{
chatCount++;
createChat("Chat "+chatCount);
chat.innerHTML="";
};

/* SHUFFLE PROMPTS */
document.getElementById("shuffleBtn").onclick=()=>{
const prompts=[
"Create a snake game",
"Make a calculator",
"Build a todo list app",
"Explain black holes simply",
"Create pong game in HTML"
];
input.value=prompts[Math.floor(Math.random()*prompts.length)];
};

/* VOICE */
let voiceEnabled=false;

document.getElementById("voiceBtn").onclick=()=>{
voiceEnabled=!voiceEnabled;
document.getElementById("voiceBtn").textContent=voiceEnabled?"Voice On":"Voice Off";
};

function speak(text){
if(!voiceEnabled) return;
const speech=new SpeechSynthesisUtterance(text);
speech.lang="en-US";
speechSynthesis.speak(speech);
}

/* MESSAGE */
function renderMessage(text,type){
const div=document.createElement("div");
div.className="msg "+type;

if(type==="bot"){
streamText(div,text);
}else{
div.textContent=text;
}

chat.appendChild(div);
chat.scrollTop=chat.scrollHeight;

if(activeChat){
chats[activeChat]=chat.innerHTML;
chatMemory[activeChat].push({role:type,text});
}

if(type==="bot") speak(text);
}

function streamText(el,text){
const words=text.split(" ");
let i=0;
const interval=setInterval(()=>{
el.textContent+=words[i]+" ";
i++;
if(i>=words.length) clearInterval(interval);
chat.scrollTop=chat.scrollHeight;
},30);
}

/* MINI APP */
function generateMiniApp(prompt){
prompt=prompt.toLowerCase();

if(prompt.includes("calculator")){
return `<!DOCTYPE html><html><body style="font-family:sans-serif;text-align:center;padding:40px">
<h2>Calculator</h2>
<input id="a" type="number"> + <input id="b" type="number">
<button onclick="calc()">=</button>
<h3 id="r"></h3>
<script>
function calc(){
let a=+document.getElementById('a').value;
let b=+document.getElementById('b').value;
document.getElementById('r').innerText=a+b;
}
<\/script>
</body></html>`;
}

return null;
}

/* CODE BLOCK */
function renderCode(code){
const block=document.createElement("div");
block.className="codeBlock";

const pre=document.createElement("pre");
pre.textContent=code;

const run=document.createElement("button");
run.textContent="Run";
run.className="runBtn";
run.onclick=()=>{
document.getElementById("previewModal").style.display="flex";
document.getElementById("gameFrame").srcdoc=code;
};

const copy=document.createElement("button");
copy.textContent="Copy";
copy.className="copyBtn";
copy.onclick=()=>navigator.clipboard.writeText(code);

const download=document.createElement("button");
download.textContent="Download";
download.className="downloadBtn";
download.onclick=()=>{
const a=document.createElement("a");
a.href=URL.createObjectURL(new Blob([code],{type:"text/html"}));
a.download="app.html";
a.click();
};

block.appendChild(run);
block.appendChild(copy);
block.appendChild(download);
block.appendChild(pre);
chat.appendChild(block);
}

/* AI */
async function askAI(msg){

const thinking=document.createElement("div");
thinking.className="msg bot";
thinking.innerHTML='<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
chat.appendChild(thinking);

const mini=generateMiniApp(msg);

if(mini){
thinking.remove();
renderMessage("I built a mini app ↓","bot");
renderCode(mini);
return;
}

try{
const res=await fetch("https://text.pollinations.ai/"+encodeURIComponent(msg));
const text=await res.text();
thinking.remove();
renderMessage(text,"bot");
}catch(err){
thinking.remove();
renderMessage("Server busy. Try again.","bot");
}
}

/* SEND */
function send(){
const msg=input.value.trim();
if(!msg)return;
renderMessage(msg,"user");
input.value="";
askAI(msg);
}

document.getElementById("sendBtn").onclick=send;

input.addEventListener("keydown",e=>{
if(e.key==="Enter"&&!e.shiftKey){
e.preventDefault();
send();
}
});

/* CLEAR */
document.getElementById("clearBtn").onclick=()=>chat.innerHTML="";

/* THEME */
document.getElementById("themeBtn").onclick=()=>{
if(document.body.style.background==="white"){
document.body.style.background="#020617";
}else{
document.body.style.background="white";
}
};

/* PREVIEW */
document.getElementById("closePreview").onclick=()=>{
document.getElementById("previewModal").style.display="none";
};

</script>

</body>
</html>
