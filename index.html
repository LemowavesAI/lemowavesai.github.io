<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemowaves AI - Chatbot by Sam</title>
<link rel="icon" href="logo.jpg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}

:root{
--bg:#020617;
--panel:#111827;
--accent:#22c55e;
--text:white;
}

body{
margin:0;
font-family:Inter,system-ui;
background:var(--bg);
color:var(--text);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
}

body.light{
--bg:#f5f7fb;
--panel:white;
--text:#0f172a;
}

#particles{position:fixed;inset:0;z-index:0}

/* landing */
.landing{
position:relative;
z-index:1;
min-height:100vh;
width:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
animation:fadeIn 1s ease;
}

.landingContent{
background:transparent;
padding:20px;
border-radius:0;
backdrop-filter:none;
max-width:700px;
width:90%;
box-shadow:none;
display:flex;
flex-direction:column;
align-items:center;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes screenOut{
from{opacity:1;transform:scale(1)}
to{opacity:0;transform:scale(.96)}
}

@keyframes screenIn{
from{opacity:0;transform:scale(1.03)}
to{opacity:1;transform:scale(1)}
}

.logo{
font-size:clamp(48px,8vw,90px);
font-weight:900;
color:var(--accent);
line-height:1.1;
white-space:nowrap;
animation:logoFloat 4s ease-in-out infinite;
text-shadow:0 0 10px rgba(34,197,94,.35);
}

@keyframes logoFloat{
0%{transform:translateY(0);text-shadow:0 0 6px rgba(34,197,94,.25)}
50%{transform:translateY(-8px);text-shadow:0 0 18px rgba(34,197,94,.45)}
100%{transform:translateY(0);text-shadow:0 0 6px rgba(34,197,94,.25)}
}

.tagline{
opacity:.9;
margin-top:18px;
max-width:520px;
font-size:18px;
text-align:center;
}

.startBtn{
margin-top:40px;
background:var(--accent);
color:white;
border:none;
padding:14px 34px;
border-radius:16px;
font-size:18px;
cursor:pointer;
}

/* app */
.app{
position:relative;
z-index:1;
display:none;
height:100vh;
width:100%;
max-width:1200px;
}

.layout{display:flex;height:100%}

.sidebar{
width:260px;
background:var(--bg);
border-right:1px solid #1f2937;
padding:16px;
display:none;
flex-direction:column;
}

.sidebar.open{display:flex}

.newChat{
background:var(--accent);
border:none;
padding:10px;
border-radius:10px;
color:white;
cursor:pointer;
margin-bottom:10px;
font-size:13px;
}

.shuffleBtn{
background:#6366f1;
border:none;
padding:8px;
border-radius:8px;
color:white;
font-size:12px;
margin-bottom:12px;
cursor:pointer;
}

.chatHistory{
flex:1;
overflow:auto;
display:flex;
flex-direction:column;
gap:8px;
}

.chatItem{
display:flex;
justify-content:space-between;
background:var(--panel);
padding:10px;
border-radius:8px;
font-size:14px;
cursor:pointer;
}

.chatItem.active{outline:1px solid var(--accent)}

.chatArea{
flex:1;
display:flex;
flex-direction:column;
height:100%;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
border-bottom:1px solid #1f2937;
}

h1{margin:0;font-weight:800;color:var(--accent)}

.controls{display:flex;gap:8px}

button{border:none;border-radius:8px;padding:8px 12px;cursor:pointer}

.theme{background:#6366f1;color:white}
.voice{background:#0ea5e9;color:white}
.clear{background:#ef4444;color:white}
.send{background:var(--accent);color:white}

#chat{
flex:1;
overflow-y:auto;
padding:22px;
display:flex;
flex-direction:column;
gap:16px;
}

.msg{
max-width:70%;
padding:14px 16px;
border-radius:16px;
line-height:1.7;
}

.user{background:#0ea5e9;align-self:flex-end;color:white}
.bot{background:var(--panel);border:1px solid #1f2937}

#inputArea{
display:flex;
gap:10px;
padding:14px;
border-top:1px solid #1f2937;
}

textarea{
flex:1;
resize:none;
min-height:44px;
padding:12px;
border-radius:12px;
border:none;
background:#000;
color:white;
}

/* desktop font improvement */
@media (min-width:900px){
body{font-size:18px}
.msg{font-size:18px}
h1{font-size:30px}
textarea{font-size:18px}
button{font-size:16px}
}

/* mobile keep original */
@media (max-width:899px){
body{font-size:13px}
}

/* code blocks */
.codeBlock{background:#0b1020;border:1px solid #1f2937;border-radius:10px;padding:12px;margin-top:8px;position:relative}
.copyBtn{position:absolute;top:6px;right:6px;background:#22c55e;color:white;border:none;border-radius:6px;padding:4px 8px;font-size:11px}
.runBtn{position:absolute;top:6px;right:70px;background:#0ea5e9;color:white;border:none;border-radius:6px;padding:4px 8px;font-size:11px}
.downloadBtn{position:absolute;top:6px;right:140px;background:#6366f1;color:white;border:none;border-radius:6px;padding:4px 8px;font-size:11px}

#previewModal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:10}
#previewBox{width:90%;height:85%;background:white;border-radius:12px;overflow:hidden;display:flex;flex-direction:column}
#previewBox iframe{flex:1;border:none}
#closePreview{background:#ef4444;color:white;border:none;padding:8px}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
<div class="landingContent">
<div class="logo">Lemowaves AI</div>
<div class="tagline">Lemowaves AI is a smart Gen Z AI chatbot created by Sam. Talk, ask questions, and explore AI in a fun way.</div>
<button class="startBtn" id="startBtn">Get Started</button>
</div>
</div>

<div class="app" id="app">
<div class="layout">

<div class="sidebar" id="sidebar">
<button class="newChat" id="newChatBtn">+ New Chat</button>
<button class="shuffleBtn" id="shuffleBtn">Shuffle</button>
<div class="chatHistory" id="history"></div>
</div>

<div class="chatArea">
<header>
<div>
<button id="menuBtn">☰</button>
<h1>Lemowaves AI</h1>
</div>
<div class="controls">
<button id="themeBtn" class="theme">Theme</button>
<button id="voiceBtn" class="voice">Voice Off</button>
<button id="clearBtn" class="clear">Clear</button>
</div>
</header>

<div id="chat"></div>

<div id="inputArea">
<textarea id="userInput" placeholder="Ask anything..."></textarea>
<button id="sendBtn" class="send">Send</button>
</div>

</div>
</div>
</div>

<div id="previewModal">
<div id="previewBox">
<button id="closePreview">Close Preview</button>
<iframe id="gameFrame"></iframe>
</div>
</div>

<script>

/* particles */
const canvas=document.getElementById("particles")
const ctx=canvas.getContext("2d")
let particles=[]

function resize(){
canvas.width=window.innerWidth
canvas.height=window.innerHeight
}
resize()
window.addEventListener("resize",resize)

for(let i=0;i<80;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-.5)*0.3,
vy:(Math.random()-.5)*0.3
})
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height)
ctx.fillStyle="#22c55e"
particles.forEach(p=>{
p.x+=p.vx
p.y+=p.vy
if(p.x<0||p.x>canvas.width)p.vx*=-1
if(p.y<0||p.y>canvas.height)p.vy*=-1
ctx.beginPath()
ctx.arc(p.x,p.y,1.5,0,Math.PI*2)
ctx.fill()
})
requestAnimationFrame(animate)
}
animate()

/* UI refs */
const landing=document.getElementById("landing")
const app=document.getElementById("app")
const chat=document.getElementById("chat")
const input=document.getElementById("userInput")
const sendBtn=document.getElementById("sendBtn")
const themeBtn=document.getElementById("themeBtn")
const voiceBtn=document.getElementById("voiceBtn")
const clearBtn=document.getElementById("clearBtn")
const sidebar=document.getElementById("sidebar")
const historyDiv=document.getElementById("history")
const newChatBtn=document.getElementById("newChatBtn")
const shuffleBtn=document.getElementById("shuffleBtn")
const menuBtn=document.getElementById("menuBtn")

let chatCount=1
let chats={}
let activeChat=null

menuBtn.onclick=()=>sidebar.classList.toggle("open")

function createChat(name){
const id="chat_"+Date.now()
const item=document.createElement("div")
item.className="chatItem"

const label=document.createElement("span")
label.textContent=name

const del=document.createElement("button")
del.textContent="✕"
del.style.background="transparent"
del.style.color="#ef4444"
del.style.cursor="pointer"

del.onclick=(e)=>{
e.stopPropagation()
delete chats[id]
item.remove()
if(activeChat===id){
chat.innerHTML=""
activeChat=null
}
}

item.appendChild(label)
item.appendChild(del)

item.onclick=()=>{
activeChat=id
chat.innerHTML=chats[id]||""

Array.from(historyDiv.children).forEach(c=>c.classList.remove("active"))
item.classList.add("active")
}

historyDiv.appendChild(item)
chats[id]=""

if(!activeChat){
activeChat=id
item.classList.add("active")
}
}

newChatBtn.onclick=()=>{
chatCount++
createChat("Chat "+chatCount)
chat.innerHTML=""
}

shuffleBtn.onclick=()=>{
const msgs=["Tell me something cool","Create a mini game","Explain black holes","Write a fun fact","Build a calculator app"]
input.value=msgs[Math.floor(Math.random()*msgs.length)]
}

createChat("Chat 1")

/* landing transition */
document.getElementById("startBtn").onclick=()=>{
landing.style.animation="screenOut .5s forwards"
setTimeout(()=>{
landing.style.display="none"
app.style.display="block"
app.style.animation="screenIn .6s ease"
},450)
}

let voiceEnabled=false

voiceBtn.onclick=()=>{
voiceEnabled=!voiceEnabled
voiceBtn.textContent=voiceEnabled?"Voice On":"Voice Off"
}

function speak(text){
if(!voiceEnabled) return
const speech=new SpeechSynthesisUtterance(text)
speech.lang="en-US"
speechSynthesis.speak(speech)
}

function renderMessage(text,type){
const div=document.createElement("div")
div.className="msg "+type

div.textContent=text
chat.appendChild(div)
chat.scrollTop=chat.scrollHeight

if(type==="bot") speak(text)
}

async function askAI(msg){

try{

const res=await fetch("https://text.pollinations.ai/"+encodeURIComponent(msg),{cache:"no-store"})

if(!res.ok) throw new Error("API error")

let text=await res.text()
text=text.replace(/openai/gi,"Lemowaves")

renderMessage(text,"bot")

}catch{
renderMessage("Server busy or 502 error. Try again in a moment.","bot")
}
}

function send(){
const msg=input.value.trim()
if(!msg) return
renderMessage(msg,"user")
input.value=""
askAI(msg)
}

sendBtn.onclick=send

input.addEventListener("keydown",e=>{
if(e.key==="Enter" && !e.shiftKey){
e.preventDefault()
send()
}
})

clearBtn.onclick=()=>chat.innerHTML=""

themeBtn.onclick=()=>document.body.classList.toggle("light")

</script>

</body>
</html>
