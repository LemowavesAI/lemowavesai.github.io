<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lemowaves AI • Gen-Z Vibes by Sam</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #020617;
      --text: #ffffff;
      --accent: #22c55e;
      --user-bg: #0ea5e9;
      --bot-bg: #111827;
      --sidebar-bg: #020617;
      --panel-bg: #111827;
      --border: #1f2937;
      --input-bg: #000000;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, system-ui, sans-serif;
      overflow-x: hidden;
    }

    #particles {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .landing {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
      animation: fadeIn 1s ease;
    }

    .logo {
      font-size: clamp(52px, 9vw, 96px);
      font-weight: 800;
      color: var(--accent);
      animation: logoFloat 4.5s ease-in-out infinite;
      letter-spacing: -1.5px;
    }

    .tagline {
      margin-top: 16px;
      font-size: 20px;
      opacity: 0.88;
      line-height: 1.4;
      max-width: 500px;
    }

    .startBtn {
      margin-top: 32px;
      background: var(--accent);
      border: none;
      padding: 15px 45px;
      color: white;
      border-radius: 18px;
      font-size: 20px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.25s;
    }

    .startBtn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 30px rgba(34,197,94,0.5);
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0); text-shadow: 0 0 0 #22c55e; }
      50%      { transform: translateY(-12px); text-shadow: 0 0 30px #22c55e; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }

    @keyframes screenOut {
      from { opacity: 1; transform: scale(1); }
      to   { opacity: 0; transform: scale(0.92); }
    }

    .app {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 1;
      animation: fadeIn 0.7s ease;
    }

    .layout {
      display: flex;
      height: 100%;
    }

    .sidebar {
      width: 230px;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--border);
      padding: 14px;
      display: none;
      flex-direction: column;
      transition: transform 0.3s ease;
    }

    .sidebar.open {
      display: flex;
    }

    .newChat, .shuffleBtn {
      border: none;
      padding: 12px;
      color: white;
      border-radius: 12px;
      margin-bottom: 10px;
      cursor: pointer;
      font-weight: 600;
      font-size: 15px;
    }

    .newChat { background: var(--accent); }
    .shuffleBtn { background: #6366f1; }

    .chatHistory {
      flex: 1;
      overflow-y: auto;
      margin-top: 10px;
    }

    .chatItem {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px;
      background: var(--panel-bg);
      border-radius: 10px;
      margin-bottom: 8px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.2s;
    }

    .chatItem:hover { background: #1f2937; }
    .chatItem.active {
      outline: 2px solid var(--accent);
      outline-offset: 1px;
    }

    .chatItem span {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .chatItem button {
      background: none;
      border: none;
      color: #ef4444;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
    }

    .chatArea {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 100%;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
      z-index: 10;
    }

    .controls { display: flex; gap: 8px; }

    button {
      border: none;
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 14px;
      transition: transform 0.2s;
    }

    button:hover { transform: scale(1.04); }

    .send {
      background: var(--accent);
      color: white;
      padding: 9px 20px;
      font-size: 15px;
    }

    .clear { background: #ef4444; color: white; }
    .voice  { background: #0ea5e9; color: white; }
    .theme  { background: #6366f1; color: white; font-size: 20px; padding: 7px 12px; }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      -webkit-overflow-scrolling: touch;
    }

    .msg {
      max-width: 88%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.5;
      font-size: 16px;
      word-wrap: break-word;
      overflow-wrap: anywhere;
    }

    .user {
      background: var(--user-bg);
      color: #fff;
      align-self: flex-end;
    }

    .bot {
      background: var(--bot-bg);
      color: var(--text);
    }

    #inputArea {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    textarea {
      flex: 1;
      resize: none;
      padding: 11px 14px;
      border-radius: 12px;
      border: none;
      background: var(--input-bg);
      color: var(--text);
      font-size: 16px;
      line-height: 1.45;
      min-height: 48px;
    }

    #imageBtn {
      background: #f59e0b;
      color: white;
      font-size: 22px;
      padding: 10px 14px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .dot {
      display: inline-block;
      width: 9px;
      height: 9px;
      margin: 0 4px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.3s infinite;
    }

    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes pulse {
      0%, 100% { transform: scale(0.6); opacity: 0.4; }
      50%      { transform: scale(1.4); opacity: 1;   }
    }

    @media (max-width: 800px) {
      .sidebar { width: 260px; }
      .msg, textarea { font-size: 15px; }
      header, #chat, #inputArea { padding: 10px 14px; }
    }

    @media (max-height: 700px) {
      header { padding: 10px 14px; }
      #inputArea { padding: 10px 14px; }
      #chat { padding: 12px 14px; gap: 10px; }
      .msg { padding: 10px 14px; font-size: 15px; }
    }
  </style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="landing" id="landing">
  <div class="logo">Lemowaves AI</div>
  <div class="tagline">
    Gen-Z energy • Memory on lock • Built different in 2026 🔥
  </div>
  <button class="startBtn" id="startBtn">START VIBING</button>
</div>

<div class="app" id="app">
  <div class="layout">

    <div class="sidebar" id="sidebar">
      <button class="newChat" id="newChatBtn">+ New Conversation</button>
      <button class="shuffleBtn" id="shuffleBtn">🔀 Random Prompt</button>
      <div id="history" class="chatHistory"></div>
    </div>

    <div class="chatArea">
      <header>
        <div style="display:flex; align-items:center; gap:12px;">
          <button id="menuBtn" style="font-size:24px; background:none; color:var(--accent); border:none; cursor:pointer;">☰</button>
          <div style="font-weight:800; color:#22c55e; font-size:22px;">Lemowaves AI</div>
        </div>
        <div class="controls">
          <button id="themeBtn" class="theme">🌙</button>
          <button id="voiceBtn" class="voice">🎤 Off</button>
          <button id="clearBtn" class="clear">Clear Chat</button>
        </div>
      </header>

      <div id="chat"></div>

      <div id="inputArea">
        <input type="file" id="imageInput" accept="image/*" style="display:none">
        <button id="imageBtn">📷</button>
        <textarea id="userInput" placeholder="Drop anything... serious, memes, code, whatever"></textarea>
        <button id="sendBtn" class="send">Send</button>
      </div>
    </div>

  </div>
</div>

<script>
// ───────────────────────────────────────────────
// PARTICLES BACKGROUND
// ───────────────────────────────────────────────
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");
let particles = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

for (let i = 0; i < 90; i++) {
  particles.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    vx: (Math.random() - 0.5) * 0.6,
    vy: (Math.random() - 0.5) * 0.6
  });
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = "#22c55e";
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
    if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 1.7, 0, Math.PI * 2);
    ctx.fill();
  });
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ───────────────────────────────────────────────
// DOM ELEMENTS & STATE
// ───────────────────────────────────────────────
const landing    = document.getElementById("landing");
const app        = document.getElementById("app");
const chatDiv    = document.getElementById("chat");
const input      = document.getElementById("userInput");
const sidebar    = document.getElementById("sidebar");
const historyDiv = document.getElementById("history");

let chatList      = [];
let conversations = {};
let activeChat    = null;
let isDark        = true;
let voiceEnabled  = false;

// ───────────────────────────────────────────────
// STORAGE (SAFE + FALLBACK)
// ───────────────────────────────────────────────
let storageAvailable = false;
let memoryStorage    = {};

try {
  localStorage.setItem("__test__", "1");
  localStorage.removeItem("__test__");
  storageAvailable = true;
} catch (e) {}

function saveState() {
  const payload = { chatList, conversations, activeChat };
  if (storageAvailable) {
    localStorage.setItem("lemowaves_data", JSON.stringify(payload));
  } else {
    memoryStorage = payload;
  }
}

function loadState() {
  let rawData;
  if (storageAvailable) {
    rawData = localStorage.getItem("lemowaves_data");
  } else {
    rawData = JSON.stringify(memoryStorage);
  }

  if (!rawData) {
    createNewChat("Chat 1");
    return;
  }

  try {
    const data = JSON.parse(rawData);
    chatList = data.chatList || [];
    conversations = data.conversations || {};
    activeChat = data.activeChat || null;

    chatList.forEach(({id, name}) => {
      const item = createChatItem(id, name);
      historyDiv.appendChild(item);
    });

    if (activeChat && conversations[activeChat]) {
      const el = historyDiv.querySelector(`[data-id="${activeChat}"]`);
      if (el) switchChat(activeChat, el);
    } else if (chatList.length > 0) {
      switchChat(chatList[0].id, historyDiv.children[0]);
    }
  } catch (err) {
    createNewChat("Chat 1");
  }
}

// ───────────────────────────────────────────────
// CHAT MANAGEMENT
// ───────────────────────────────────────────────
function createChatItem(id, name) {
  const item = document.createElement("div");
  item.className = "chatItem";
  item.dataset.id = id;
  item.innerHTML = `<span>${name}</span><button>×</button>`;

  item.addEventListener("click", e => {
    if (e.target.tagName === "BUTTON") return;
    switchChat(id, item);
  });

  item.querySelector("button").addEventListener("click", e => {
    e.stopPropagation();
    deleteChat(id);
  });

  return item;
}

function createNewChat(name = `Chat ${chatList.length + 1}`) {
  const id = "chat_" + Date.now() + Math.random().toString(36).slice(2, 8);
  chatList.push({ id, name });
  conversations[id] = [];
  const item = createChatItem(id, name);
  historyDiv.appendChild(item);
  saveState();
  switchChat(id, item);
}

function deleteChat(id) {
  const idx = chatList.findIndex(c => c.id === id);
  if (idx < 0) return;
  chatList.splice(idx, 1);
  delete conversations[id];
  const el = historyDiv.querySelector(`[data-id="${id}"]`);
  if (el) el.remove();
  saveState();

  if (activeChat === id) {
    if (chatList.length > 0) {
      switchChat(chatList[0].id, historyDiv.children[0]);
    } else {
      activeChat = null;
      chatDiv.innerHTML = "";
    }
  }
}

function switchChat(id, element) {
  Array.from(historyDiv.children).forEach(el => el.classList.remove("active"));
  if (element) element.classList.add("active");

  activeChat = id;
  chatDiv.innerHTML = "";

  if (conversations[id]) {
    conversations[id].forEach(msg => {
      const div = document.createElement("div");
      div.className = `msg ${msg.role === "user" ? "user" : "bot"}`;
      div.textContent = msg.content;
      chatDiv.appendChild(div);
    });
  }
  chatDiv.scrollTop = chatDiv.scrollHeight;
  saveState();
}

// ───────────────────────────────────────────────
// MESSAGE RENDERING & STREAMING
// ───────────────────────────────────────────────
function addMessage(role, content) {
  const msg = document.createElement("div");
  msg.className = `msg ${role === "user" ? "user" : "bot"}`;
  msg.textContent = content;
  chatDiv.appendChild(msg);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  if (activeChat) {
    conversations[activeChat].push({ role, content });
    saveState();
  }
}

function streamResponse(element, text, callback) {
  const words = text.split(/\s+/);
  let index = 0;
  const interval = setInterval(() => {
    if (index < words.length) {
      element.textContent += (index > 0 ? " " : "") + words[index++];
      chatDiv.scrollTop = chatDiv.scrollHeight;
    } else {
      clearInterval(interval);
      callback?.();
    }
  }, 30);
}

// ───────────────────────────────────────────────
// AI REQUEST LOGIC
// ───────────────────────────────────────────────
async function askAI() {
  if (!activeChat) return;

  const loading = document.createElement("div");
  loading.className = "msg bot";
  loading.innerHTML = '<span class="dot"></span><span class="dot"></span><span class="dot"></span>';
  chatDiv.appendChild(loading);
  chatDiv.scrollTop = chatDiv.scrollHeight;

  try {
    const systemPrompt = `You are Lemowaves AI — Gen-Z powered assistant made by Sam in Bengaluru. Today is March 17, 2026. Stay current with 2026 trends, memes, tech, IPL, social media vibes.
Use full Gen-Z slang (no cap, fire, mid, rizz, bussin, etc) + emojis when user is casual/funny/joking.
Switch to clean, professional tone when user is serious, asking for code, advice or deep topics.
You have perfect memory of this entire conversation. Be witty, helpful, fast and savage when needed.`;

    const historyText = conversations[activeChat]
      .map(m => `${m.role === "user" ? "User" : "You"}: ${m.content}`)
      .join("\n");

    const fullPrompt = systemPrompt + "\n\n" + historyText + "\nYou:";

    const response = await fetch("https://text.pollinations.ai/" + encodeURIComponent(fullPrompt));
    let replyText = await response.text();

    if (!replyText.trim()) replyText = "Bruh the AI ghosted us 💀 Try again fam";

    loading.remove();

    const botMessage = document.createElement("div");
    botMessage.className = "msg bot";
    chatDiv.appendChild(botMessage);

    streamResponse(botMessage, replyText, () => {
      if (activeChat) {
        conversations[activeChat].push({ role: "assistant", content: replyText });
        saveState();
      }
      if (voiceEnabled) speak(replyText);
    });

  } catch (error) {
    loading.remove();
    addMessage("bot", "Network acting sus rn... try again king");
  }
}

// ───────────────────────────────────────────────
// IMAGE UPLOAD (PLACEHOLDER)
// ───────────────────────────────────────────────
document.getElementById("imageBtn").onclick = () => document.getElementById("imageInput").click();

document.getElementById("imageInput").onchange = e => {
  const file = e.target.files[0];
  if (!file || !activeChat) return;
  addMessage("user", `📸 Uploaded: ${file.name} (vision coming soon)`);
  e.target.value = "";
};

// ───────────────────────────────────────────────
// SEND MESSAGE HANDLER
// ───────────────────────────────────────────────
function handleSend() {
  const message = input.value.trim();
  if (!message) return;

  if (!activeChat) createNewChat();

  addMessage("user", message);
  input.value = "";
  askAI();
}

document.getElementById("sendBtn").onclick = handleSend;
input.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ───────────────────────────────────────────────
// CONTROLS & BUTTONS
// ───────────────────────────────────────────────
document.getElementById("newChatBtn").onclick = () => createNewChat();

document.getElementById("shuffleBtn").onclick = () => {
  const examples = [
    "Build a viral TikTok clone UI in HTML+CSS+JS",
    "Code a clean IPL 2026 points table with dark mode",
    "Make a savage roast generator",
    "Create Pomodoro timer with Gen-Z motivational quotes",
    "Write Python script to predict crypto pumps (jk)"
  ];
  input.value = examples[Math.floor(Math.random() * examples.length)];
};

document.getElementById("clearBtn").onclick = () => {
  if (activeChat) {
    conversations[activeChat] = [];
    chatDiv.innerHTML = "";
    saveState();
  }
};

document.getElementById("themeBtn").onclick = () => {
  isDark = !isDark;
  document.getElementById("themeBtn").textContent = isDark ? "🌙" : "☀️";

  const root = document.documentElement.style;
  if (isDark) {
    root.setProperty("--bg", "#020617");
    root.setProperty("--text", "#ffffff");
    root.setProperty("--user-bg", "#0ea5e9");
    root.setProperty("--bot-bg", "#111827");
    root.setProperty("--sidebar-bg", "#020617");
    root.setProperty("--panel-bg", "#111827");
    root.setProperty("--border", "#1f2937");
    root.setProperty("--input-bg", "#000000");
  } else {
    root.setProperty("--bg", "#f8fafc");
    root.setProperty("--text", "#0f172a");
    root.setProperty("--user-bg", "#2563eb");
    root.setProperty("--bot-bg", "#e2e8f0");
    root.setProperty("--sidebar-bg", "#f1f5f9");
    root.setProperty("--panel-bg", "#f8fafc");
    root.setProperty("--border", "#cbd5e1");
    root.setProperty("--input-bg", "#ffffff");
  }
};

document.getElementById("voiceBtn").onclick = () => {
  voiceEnabled = !voiceEnabled;
  document.getElementById("voiceBtn").textContent = voiceEnabled ? "🎤 On" : "🎤 Off";
};

function speak(text) {
  if (!voiceEnabled) return;
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.rate = 1.08;
  speechSynthesis.speak(utterance);
}

document.getElementById("menuBtn").onclick = () => {
  sidebar.classList.toggle("open");
};

document.getElementById("startBtn").onclick = () => {
  landing.style.animation = "screenOut 0.7s forwards";
  setTimeout(() => {
    landing.style.display = "none";
    app.style.display = "block";
  }, 700);
};

// ───────────────────────────────────────────────
// INITIALIZATION
// ───────────────────────────────────────────────
loadState();

</script>
</body>
</html>
